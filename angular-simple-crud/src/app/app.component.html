<div class="container">
  <div class="row">
    <div class="col-md-8 mt-4">
      <ul class="list-group">
        <li
          *ngFor="let colaborador of colaboradorArray"
          class="list-group-item list-group-item-action d-flex align-items-center"
          (click)="editarColaborador(colaborador)"
          [class.active]="colaborador == selectedColaborador"
        >
          <span class="badge badge-primary mr-2 mb-0">{{ colaborador.id }}</span>
          <div class="flex-fill">
            {{ colaborador.name }} - {{ colaborador.country }}
          </div>
          <button
            class="btn btn-sm btn-outline-danger"
            (click)="excluirColaborador(colaborador); $event.stopPropagation();"
          >
            Excluir
          </button>
        </li>
      </ul>
      <div class="card mt-4">
        <div class="card-body">
          <div class="card-title">insira um novo colaborador</div>
          <div class="form-group">
            <input type="text" [(ngModel)]="selectedColaborador.name" class="form-control mb-2" placeholder="Nome" />
            <input type="text" [(ngModel)]="selectedColaborador.country" class="form-control" placeholder="País" />
          </div>
          <button class="btn btn-primary" (click)="salvarColaborador()">
            {{ selectedColaborador.id === 0 ? 'Adicionar' : 'Atualizar' }}
          </button>
          <button
            *ngIf="selectedColaborador.id !== 0"
            class="btn btn-secondary ml-2"
            (click)="limparColaborador()"
          >
            Cancelar edição
          </button>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <img
        width="300"

</div>
